services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=nxFpdQpyEEz33B
    ports:
      - "1433:1433"

  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=mssql+pyodbc://sa:nxFpdQpyEEz33B@db:1433/master?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
    depends_on:
      - db
    command: uvicorn server.main:app --host 0.0.0.0 --port 5000 --reload